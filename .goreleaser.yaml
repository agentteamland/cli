version: 2

project_name: atl

before:
  hooks:
    - go mod tidy

builds:
  - id: atl
    main: ./cmd/atl
    binary: atl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/agentteamland/cli/internal/config.Version={{.Version}}
      - -X github.com/agentteamland/cli/internal/config.Commit={{.Commit}}
      - -X github.com/agentteamland/cli/internal/config.Date={{.Date}}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]        # goreleaser v2: plural 'formats' replaces singular 'format'
    files:
      - README.md
      - LICENSE

# MSI installer — planned, not yet shipped.
# Why not now: wixl (the Linux-based MSI generator) produces binaries we can't
# test end-to-end on macOS. Shipping an unverified MSI risks another
# goreleaser CI failure and emails. Plan:
#   1. A Windows teammate runs a local wixl build once using scripts/msi/atl.wxs
#      (to be written) and verifies the resulting MSI installs + adds to PATH +
#      uninstalls cleanly.
#   2. Re-enable this block, CI apt-installs msitools, MSI ships on each tag.
# Until then, Windows users install via scripts/install.ps1 one-liner (zero
# package-manager prerequisites) or scoop / winget (once winget PR merges).
#
# msi:
#   - id: atl-msi
#     name: "atl_{{ .Version }}_windows_{{ .Arch }}"
#     ids: [atl]
#     wxs: ./scripts/msi/atl.wxs

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"   # renamed from name_template in goreleaser v2

# Homebrew tap — publishes a formula to agentteamland/homebrew-tap on each tag.
brews:
  - name: atl
    repository:
      owner: agentteamland
      name: homebrew-tap
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/agentteamland/cli"
    description: "AgentTeamLand package manager CLI — install teams, scaffold projects"
    license: "MIT"
    commit_author:
      name: agentteamland-bot
      email: noreply@agentteamland.com
    commit_msg_template: "chore: bump atl to {{ .Tag }}"
    test: |
      system "#{bin}/atl --version"
    install: |
      bin.install "atl"

# Scoop bucket — publishes a manifest to agentteamland/scoop-bucket on each tag.
scoops:
  - name: atl
    repository:
      owner: agentteamland
      name: scoop-bucket
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: bucket
    homepage: "https://github.com/agentteamland/cli"
    description: "AgentTeamLand package manager CLI"
    license: "MIT"
    commit_author:
      name: agentteamland-bot
      email: noreply@agentteamland.com
    commit_msg_template: "chore: bump atl to {{ .Tag }}"

# Winget — pushes manifest updates to agentteamland/winget-pkgs (our fork of
# microsoft/winget-pkgs) on each tag. We do NOT auto-open the PR to
# microsoft/winget-pkgs from CI; that step has historically failed with a
# 403 ("Resource not accessible by personal access token") because creating
# cross-fork PRs requires a PAT scope we don't want to grant to CI.
#
# The manifest is ready-to-go in agentteamland/winget-pkgs; when we want to
# publish a new version on winget, we open the PR manually (or via gh CLI
# from a local terminal where we're logged in). This is acceptable for now
# — winget publishing cadence is coarser than brew/scoop anyway, and the
# first Microsoft review has to clear before auto-updates matter.
#
# To re-enable automatic PR creation later:
#   1. Provision a PAT with `public_repo` scope (classic PAT) or fine-grained
#      with PR creation on microsoft/winget-pkgs (note: Microsoft does not
#      grant fine-grained access to their repo, so classic PAT is the path)
#   2. Store as TAP_GITHUB_TOKEN or a new WINGET_PR_TOKEN secret
#   3. Flip `pull_request.enabled` back to true
winget:
  - name: atl
    publisher: agentteamland
    license: MIT
    homepage: "https://github.com/agentteamland/cli"
    description: "AgentTeamLand package manager CLI — install teams, scaffold projects"
    short_description: "AgentTeamLand CLI"
    package_identifier: "agentteamland.atl"
    publisher_support_url: "https://github.com/agentteamland/cli/issues"
    publisher_url: "https://github.com/agentteamland"
    copyright: "Copyright (c) 2026 AgentTeamLand"
    release_notes_url: "https://github.com/agentteamland/cli/releases/tag/{{ .Tag }}"
    tags:
      - cli
      - package-manager
      - ai-agents
      - devtool
    commit_author:
      name: agentteamland-bot
      email: noreply@agentteamland.com
    commit_msg_template: "chore: update atl to {{ .Version }}"
    repository:
      owner: agentteamland
      name: winget-pkgs
      branch: "atl-{{ .Version }}"
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
      pull_request:
        enabled: false        # Re-enable once we have a PAT with PR-creation scope on microsoft/winget-pkgs

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: Bug fixes
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: Documentation
      regexp: "^.*docs[(\\w)]*:+.*$"
      order: 2
    - title: Others
      order: 999

release:
  github:
    owner: agentteamland
    name: cli
  draft: false
  prerelease: auto
  header: |
    ## atl {{.Version}}

    AgentTeamLand package manager CLI.

    ### Install (macOS / Linux)

    ```bash
    # One-liner:
    curl -fsSL https://raw.githubusercontent.com/agentteamland/cli/main/scripts/install.sh | sh

    # Or manual:
    curl -fsSL https://github.com/agentteamland/cli/releases/download/{{.Tag}}/atl_{{.Version}}_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz | tar xz
    sudo mv atl /usr/local/bin/
    ```

    ### Homebrew (coming soon)

    ```bash
    brew install agentteamland/tap/atl
    ```
  footer: |
    ---

    **Full changelog:** https://github.com/agentteamland/cli/compare/{{.PreviousTag}}...{{.Tag}}
