name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Format check
        run: |
          gofmt_out="$(gofmt -l .)"
          if [ -n "$gofmt_out" ]; then
            echo "gofmt diff:"
            echo "$gofmt_out"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: |
          go build -o /tmp/atl ./cmd/atl
          /tmp/atl --version

      - name: Test
        run: go test -race ./...
