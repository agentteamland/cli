version: 2

project_name: atl

before:
  hooks:
    - go mod tidy

builds:
  - id: atl
    main: ./cmd/atl
    binary: atl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/agentteamland/cli/internal/config.Version={{.Version}}
      - -X github.com/agentteamland/cli/internal/config.Commit={{.Commit}}
      - -X github.com/agentteamland/cli/internal/config.Date={{.Date}}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

snapshot:
  name_template: "{{ incpatch .Version }}-next"

# Homebrew tap — publishes a formula to agentteamland/homebrew-tap on each tag.
brews:
  - name: atl
    repository:
      owner: agentteamland
      name: homebrew-tap
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/agentteamland/cli"
    description: "AgentTeamLand package manager CLI — install teams, scaffold projects"
    license: "MIT"
    commit_author:
      name: agentteamland-bot
      email: noreply@agentteamland.com
    commit_msg_template: "chore: bump atl to {{ .Tag }}"
    test: |
      system "#{bin}/atl --version"
    install: |
      bin.install "atl"

# Scoop bucket — publishes a manifest to agentteamland/scoop-bucket on each tag.
scoops:
  - name: atl
    repository:
      owner: agentteamland
      name: scoop-bucket
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: bucket
    homepage: "https://github.com/agentteamland/cli"
    description: "AgentTeamLand package manager CLI"
    license: "MIT"
    commit_author:
      name: agentteamland-bot
      email: noreply@agentteamland.com
    commit_msg_template: "chore: bump atl to {{ .Tag }}"

# Winget — opens a PR to microsoft/winget-pkgs from our fork on each tag.
# First submission requires Microsoft review (~1-2 weeks). Subsequent updates
# auto-merge faster once publisher is trusted.
winget:
  - name: atl
    publisher: agentteamland
    license: MIT
    homepage: "https://github.com/agentteamland/cli"
    description: "AgentTeamLand package manager CLI — install teams, scaffold projects"
    short_description: "AgentTeamLand CLI"
    package_identifier: "agentteamland.atl"
    publisher_support_url: "https://github.com/agentteamland/cli/issues"
    publisher_url: "https://github.com/agentteamland"
    copyright: "Copyright (c) 2026 AgentTeamLand"
    release_notes_url: "https://github.com/agentteamland/cli/releases/tag/{{ .Tag }}"
    tags:
      - cli
      - package-manager
      - ai-agents
      - devtool
    commit_author:
      name: agentteamland-bot
      email: noreply@agentteamland.com
    commit_msg_template: "chore: update atl to {{ .Version }}"
    repository:
      owner: agentteamland
      name: winget-pkgs
      branch: "atl-{{ .Version }}"
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
      pull_request:
        enabled: true
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: Bug fixes
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: Documentation
      regexp: "^.*docs[(\\w)]*:+.*$"
      order: 2
    - title: Others
      order: 999

release:
  github:
    owner: agentteamland
    name: cli
  draft: false
  prerelease: auto
  header: |
    ## atl {{.Version}}

    AgentTeamLand package manager CLI.

    ### Install (macOS / Linux)

    ```bash
    # One-liner:
    curl -fsSL https://raw.githubusercontent.com/agentteamland/cli/main/scripts/install.sh | sh

    # Or manual:
    curl -fsSL https://github.com/agentteamland/cli/releases/download/{{.Tag}}/atl_{{.Version}}_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz | tar xz
    sudo mv atl /usr/local/bin/
    ```

    ### Homebrew (coming soon)

    ```bash
    brew install agentteamland/tap/atl
    ```
  footer: |
    ---

    **Full changelog:** https://github.com/agentteamland/cli/compare/{{.PreviousTag}}...{{.Tag}}
